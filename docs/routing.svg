<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 236" font-family="'IBM Plex Sans', system-ui, -apple-system, sans-serif">
<rect x="0" y="0" width="880" height="236" rx="14" fill="#f4f4f1" stroke="none" stroke-width="0"/>
<text x="40" y="32" text-anchor="start" font-size="13" fill="#c39a27" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace" font-weight="600" letter-spacing="0.03em">A CHEAP WATCHER GATES THE STRONG MODELS</text>
<rect x="24" y="74" width="168" height="100" rx="10" fill="#ffffff" stroke="#e3e2db" stroke-width="1.4"/>
<text x="108.0" y="122.0" text-anchor="middle" font-size="14.5" fill="#1a1915" font-family="'IBM Plex Sans', system-ui, -apple-system, sans-serif">corner check</text>
<text x="108.0" y="139.0" text-anchor="middle" font-size="10" fill="#6b6b66" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace">Haiku, every scan</text>
<text x="108.0" y="64" text-anchor="middle" font-size="10" fill="#6b6b66" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace">cheap, always on</text>
<line x1="192" y1="96" x2="300" y2="96" stroke="#bdb9af" stroke-width="1.6"/><path d="M300 96 L293 92 L293 100 Z" fill="#bdb9af"/>
<text x="246" y="83" text-anchor="middle" font-size="9.5" fill="#6b6b66" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace">question set</text>
<rect x="300" y="74" width="176" height="46" rx="10" fill="#ffffff" stroke="#c39a27" stroke-width="1.8"/>
<circle cx="315" cy="97.0" r="3" fill="#c39a27"/>
<text x="388.0" y="95.0" text-anchor="middle" font-size="14.5" fill="#1a1915" font-family="'IBM Plex Sans', system-ui, -apple-system, sans-serif">solve</text>
<text x="388.0" y="112.0" text-anchor="middle" font-size="10" fill="#6b6b66" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace">Opus, once, cached</text>
<line x1="192" y1="152" x2="300" y2="152" stroke="#c39a27" stroke-width="1.6"/><path d="M300 152 L293 148 L293 156 Z" fill="#c39a27"/>
<text x="246" y="139" text-anchor="middle" font-size="9.5" fill="#c39a27" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace">you mark a line</text>
<rect x="300" y="130" width="104" height="46" rx="10" fill="#ffffff" stroke="#e3e2db" stroke-width="1.4"/>
<text x="352.0" y="151.0" text-anchor="middle" font-size="14.5" fill="#1a1915" font-family="'IBM Plex Sans', system-ui, -apple-system, sans-serif">verify</text>
<text x="352.0" y="168.0" text-anchor="middle" font-size="10" fill="#6b6b66" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace">Sonnet</text>
<line x1="404" y1="152" x2="414" y2="152" stroke="#bdb9af" stroke-width="1.6"/><path d="M414 152 L407 148 L407 156 Z" fill="#bdb9af"/>
<rect x="414" y="130" width="104" height="46" rx="10" fill="#ffffff" stroke="#c39a27" stroke-width="1.8"/>
<circle cx="429" cy="153.0" r="3" fill="#c39a27"/>
<text x="466.0" y="151.0" text-anchor="middle" font-size="14.5" fill="#1a1915" font-family="'IBM Plex Sans', system-ui, -apple-system, sans-serif">confirm</text>
<text x="466.0" y="168.0" text-anchor="middle" font-size="10" fill="#6b6b66" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace">Opus</text>
<line x1="518" y1="152" x2="528" y2="152" stroke="#bdb9af" stroke-width="1.6"/><path d="M528 152 L521 148 L521 156 Z" fill="#bdb9af"/>
<rect x="528" y="130" width="200" height="46" rx="10" fill="#ffffff" stroke="#e3e2db" stroke-width="1.4"/>
<text x="628.0" y="151.0" text-anchor="middle" font-size="14.5" fill="#1a1915" font-family="'IBM Plex Sans', system-ui, -apple-system, sans-serif">speaks</text>
<text x="628.0" y="168.0" text-anchor="middle" font-size="10" fill="#6b6b66" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace">a correction or “Correct”</text>
<text x="440.0" y="220" text-anchor="middle" font-size="12.5" fill="#6b6b66" font-family="'IBM Plex Sans', system-ui, -apple-system, sans-serif">The watcher runs every scan. When the whole question is written it solves once on Opus and caches it, so the first check is instant; your corner mark then wakes a verify and a confirm.</text>
